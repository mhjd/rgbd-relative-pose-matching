<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">RGB-D relative pose evaluation pipeline</title>
  <desc id="desc">The same RGB-D image pair is processed with ORB and with SuperPoint plus LightGlue. Both correspondence sets are evaluated with the same depth back-projection, PnP-RANSAC, and ground-truth comparison steps.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .tiny { font: 12px Arial, Helvetica, sans-serif; fill: #64748b; }
      .box { stroke-width: 2; rx: 14; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1040" height="520" fill="#ffffff"/>

  <text x="520" y="48" text-anchor="middle" class="title">Controlled RGB-D Relative Pose Evaluation</text>
  <text x="520" y="75" text-anchor="middle" class="small">Only the visual matching stage changes between ORB and SuperPoint + LightGlue</text>

  <rect x="48" y="170" width="190" height="122" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="143" y="206" text-anchor="middle" class="label">Same input pair</text>
  <text x="143" y="237" text-anchor="middle" class="small">RGB-D frame i</text>
  <text x="143" y="262" text-anchor="middle" class="small">RGB frame j</text>

  <rect x="318" y="120" width="230" height="96" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="433" y="158" text-anchor="middle" class="label">ORB</text>
  <text x="433" y="184" text-anchor="middle" class="small">classical matching</text>

  <rect x="318" y="276" width="230" height="96" class="box" fill="#ecfdf5" stroke="#10b981"/>
  <text x="433" y="313" text-anchor="middle" class="label">SuperPoint + LightGlue</text>
  <text x="433" y="340" text-anchor="middle" class="small">learned matching</text>

  <path d="M238 231 C272 231, 282 168, 318 168" class="arrow"/>
  <path d="M238 231 C272 231, 282 324, 318 324" class="arrow"/>

  <rect x="704" y="104" width="258" height="76" class="box" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="833" y="135" text-anchor="middle" class="label">Depth back-projection</text>
  <text x="833" y="160" text-anchor="middle" class="small">3D points from frame i</text>

  <rect x="704" y="222" width="258" height="76" class="box" fill="#f8fafc" stroke="#64748b"/>
  <text x="833" y="254" text-anchor="middle" class="label">PnP-RANSAC</text>
  <text x="833" y="279" text-anchor="middle" class="small">3D-to-2D pose estimate</text>

  <rect x="704" y="340" width="258" height="76" class="box" fill="#f8fafc" stroke="#64748b"/>
  <text x="833" y="372" text-anchor="middle" class="label">Ground-truth comparison</text>
  <text x="833" y="397" text-anchor="middle" class="small">rotation and translation error</text>

  <path d="M548 168 C610 168, 642 142, 704 142" class="soft-arrow"/>
  <path d="M548 324 C620 324, 632 142, 704 142" class="soft-arrow"/>
  <path d="M833 180 L833 222" class="arrow"/>
  <path d="M833 298 L833 340" class="arrow"/>

  <path d="M704 430 H962" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6" fill="none"/>
  <text x="833" y="464" text-anchor="middle" class="small">Shared geometric backend for both methods</text>
  <text x="833" y="488" text-anchor="middle" class="tiny">same depth maps, intrinsics, PnP-RANSAC backend, and pose-error metrics</text>
</svg>
